# Release pipeline: triggered on tags pushed to master.
# Builds Paillave.Etl.sln with .NET 9 SDK on Windows, runs tests,
# then publishes every produced .nupkg to nuget.org.

version: 1.0.{build}
skip_non_tags: true
branches:
  only:
    - master
image: Visual Studio 2022
configuration: Release
platform: Any CPU

init:
  - ps: >-
      if ($env:APPVEYOR_REPO_TAG -eq "true") {
        Update-AppveyorBuild -Version "$($env:APPVEYOR_REPO_TAG_NAME.TrimStart('v'))";
      }

before_build:
  - cmd: dotnet --info
  - cmd: dotnet restore src/Paillave.Etl.sln

build_script:
  - cmd: dotnet build src/Paillave.Etl.sln --configuration %CONFIGURATION% --no-restore -p:WarningLevel=0

test_script:
  - cmd: dotnet test src/Paillave.Etl.Tests/Paillave.Etl.Tests.csproj --configuration %CONFIGURATION% --no-build --logger "Appveyor"

artifacts:
  - path: src\**\bin\$(configuration)\*.nupkg
    name: NuGetPackages

deploy:
  - provider: NuGet
    api_key:
      secure: UgPSmSDViCSpE60+tlJDDe+ocxa2hm7ESlbze7yeh1jE0nFfS0QD71I0JipJ3fbG
    skip_symbols: false
    artifact: /.*\.nupkg/
    on:
      APPVEYOR_REPO_TAG: true
