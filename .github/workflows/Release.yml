name: ETL.NET - Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet package version (e.g. 2.4.0-beta.2). Defaults to release tag.'
        required: false

jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Compute package version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Restore
        working-directory: src
        run: dotnet restore Paillave.Etl.sln

      - name: Build
        working-directory: src
        run: >-
          dotnet build Paillave.Etl.sln
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:WarningLevel=0

      - name: Test
        working-directory: src
        run: dotnet test Paillave.Etl.Tests/Paillave.Etl.Tests.csproj --configuration Release --no-build

      - name: Pack
        working-directory: src
        run: >-
          dotnet pack Paillave.Etl.sln
          --configuration Release
          --no-build
          --output ../artifacts
          -p:Version=${{ steps.version.outputs.version }}
          -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Publish to NuGet
        run: >-
          dotnet nuget push "artifacts/*.nupkg"
          -k ${{ secrets.NUGET_API_KEY }}
          -s https://api.nuget.org/v3/index.json
          --skip-duplicate
