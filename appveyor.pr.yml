# Pull request validation: build + test, no publish.

version: 1.0.{build}-pr
branches:
  only:
    - master
image: Visual Studio 2022
configuration: Release
platform: Any CPU

before_build:
  - cmd: dotnet --info
  - cmd: dotnet restore src/Paillave.Etl.sln

build_script:
  - cmd: dotnet build src/Paillave.Etl.sln --configuration %CONFIGURATION% --no-restore -p:WarningLevel=0

test_script:
  - cmd: dotnet test src/Paillave.Etl.Tests/Paillave.Etl.Tests.csproj --configuration %CONFIGURATION% --no-build --logger "Appveyor"
